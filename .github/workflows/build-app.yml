name: Build Universal Unicode Converter (Web + Android + iOS)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-web:
    name: Build web bundle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist

  build-android:
    name: Build Android APK / AAB
    runs-on: ubuntu-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: android-actions/setup-android@v3

      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Prerender routes to static HTML for Capacitor
        run: node scripts/prerender.mjs

      - name: Install Capacitor CLI + Android platform
        run: |
          bun add -d @capacitor/cli @capacitor/core @capacitor/android @capacitor/splash-screen @capacitor/assets
          npx cap add android || echo "android already added"
          npx cap sync android

      - name: Generate icons + splash from resources/
        run: |
          if [ -d resources ]; then
            npx @capacitor/assets generate --android || true
          fi

      - name: Assemble release APK + AAB
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease bundleRelease

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: |
            android/app/build/outputs/apk/release/*.apk
            android/app/build/outputs/bundle/release/*.aab

  build-ios:
    name: Build iOS Xcode project (unsigned)
    runs-on: macos-latest
    needs: build-web
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build

      - name: Install Capacitor CLI + iOS platform
        run: |
          bun add -d @capacitor/cli @capacitor/core @capacitor/ios @capacitor/splash-screen @capacitor/assets
          npx cap add ios || echo "ios already added"
          npx cap sync ios

      - name: Generate icons + splash from resources/
        run: |
          if [ -d resources ]; then
            npx @capacitor/assets generate --ios || true
          fi

      - name: Upload iOS Xcode project
        uses: actions/upload-artifact@v4
        with:
          name: ios-project
          path: ios
